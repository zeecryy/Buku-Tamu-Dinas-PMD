<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku Tamu Digital | Input Form</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
      :root {
        --primary: #4f46e5;
        --accent: #6366f1;
        --bg-image: url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1600");
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: var(--bg-image);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.8);
        z-index: 1;
      }

      .wrapper {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 700px;
        padding: 20px;
      }

      .card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .header h2 {
        margin: 0;
        font-weight: 800;
        color: var(--primary);
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .full-width {
        grid-column: span 2;
      }

      @media (max-width: 600px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 800;
        margin-bottom: 8px;
        color: #475569;
        text-transform: uppercase;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-family: inherit;
        font-size: 1rem;
        background: #f8fafc;
      }

      input[type="text"] {
        text-transform: capitalize;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        background: #fff;
      }

      .sig-container {
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        background: #fff;
        position: relative;
      }
      #signature-pad {
        width: 100%;
        height: 180px;
        cursor: crosshair;
      }
      .clear-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 5px 12px;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 0.7rem;
        cursor: pointer;
      }

      button#submitBtn {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
      }

      button#submitBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
      }

      #status {
        margin-top: 15px;
        text-align: center;
        display: none;
        padding: 10px;
        border-radius: 10px;
        font-weight: 600;
      }
      .success {
        background: #dcfce7;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="header">
          <h2>Buku Tamu Dinas PMD Bidang Penataan dan Pekembangan Desa</h2>
          <p>Mohon isi data kunjungan Anda dengan lengkap</p>
        </div>

        <form id="guestForm">
          <div class="form-grid">
            <div class="group full-width">
              <label>Nama Lengkap & Gelar</label>
              <input
                type="text"
                id="namaInput"
                placeholder="Masukkan nama lengkap..."
                required
              />
            </div>

            <div class="group full-width">
              <label>Alamat</label>
              <input
                type="text"
                id="alamatInput"
                placeholder="Masukkan alamat Anda..."
                required
              />
            </div>

            <div class="group">
              <label>Jabatan</label>
              <input
                type="text"
                id="jabatanInput"
                placeholder="Jabatan..."
                required
              />
            </div>

            <div class="group">
              <label>No. HP / WhatsApp</label>
              <input type="tel" id="hpInput" placeholder="0812..." required />
            </div>

            <div class="group full-width">
              <label>Maksud & Tujuan Kunjungan</label>
              <textarea
                id="tujuanInput"
                rows="3"
                placeholder="Tuliskan alasan kunjungan..."
                required
              ></textarea>
            </div>

            <div class="group full-width">
              <label>Tanda Tangan (Boleh dikosongkan)</label>
              <div class="sig-container">
                <canvas id="signature-pad"></canvas>
                <button type="button" class="clear-btn" id="clearBtn">
                  Hapus
                </button>
              </div>
            </div>

            <div class="full-width">
              <button type="submit" id="submitBtn">Kirim Data Kunjungan</button>
            </div>
          </div>
        </form>
        <div id="status"></div>
      </div>
    </div>

    <script>
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbzgNa9NoMsQU8vZMLt5N7drq05d5tyRt2E_SHLIxg9uKI7qmfvJQtsAmkxQO0czIw0ugA/exec";

      const form = document.getElementById("guestForm");
      const canvas = document.getElementById("signature-pad");
      const signaturePad = new SignaturePad(canvas);

      function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      document
        .getElementById("clearBtn")
        .addEventListener("click", () => signaturePad.clear());

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");
        const status = document.getElementById("status");

        btn.disabled = true;
        btn.innerText = "Sedang Mengirim...";

        const formData = new FormData();

        formData.append("Nama", document.getElementById("namaInput").value);
        formData.append("Alamat", document.getElementById("alamatInput").value);
        formData.append(
          "Jabatan",
          document.getElementById("jabatanInput").value,
        );
        formData.append("NoHP", document.getElementById("hpInput").value);
        formData.append("Tujuan", document.getElementById("tujuanInput").value);

        const ttdData = signaturePad.isEmpty() ? "" : signaturePad.toDataURL();
        formData.append("TTD", ttdData);

        fetch(scriptURL, { method: "POST", body: formData })
          .then((response) => {
            btn.disabled = false;
            btn.innerText = "Kirim Data Kunjungan";
            status.style.display = "block";
            status.className = "success";
            status.innerHTML = "✅ Data berhasil dikirim! Terima kasih.";
            form.reset();
            signaturePad.clear();
            setTimeout(() => {
              status.style.display = "none";
            }, 5000);
          })
          .catch((error) => {
            btn.disabled = false;
            btn.innerText = "Kirim Data Kunjungan";
            alert("Gagal mengirim data. Coba lagi.");
          });
      });
    </script>
  </body>
</html>
