<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku Tamu Digital | Input Form</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="wrapper">
      <div class="card">
        <div class="header">
          <h2>Buku Tamu Dinas PMD</h2>
          <p>Bidang Penataan dan Perkembangan Desa</p>
        </div>

        <form id="guestForm">
          <div class="form-grid">
            <div class="group full-width">
              <label>Nama Lengkap & Gelar</label>
              <input
                type="text"
                id="namaInput"
                placeholder="Masukan nama Lengkap..."
                required
              />
            </div>

            <div class="group full-width">
              <label>Alamat</label>
              <input
                type="text"
                id="alamatInput"
                placeholder="Masukkan alamat lengkap..."
                required
              />
            </div>

            <div class="group">
              <label>Jabatan</label>
              <input
                type="text"
                id="jabatanInput"
                placeholder="Kepala Desa / Staf..."
                required
              />
            </div>

            <div class="group">
              <label>No. HP / WhatsApp</label>
              <input type="tel" id="hpInput" placeholder="0812xxxx" required />
            </div>

            <div class="group full-width">
              <label>Maksud & Tujuan Kunjungan</label>
              <textarea
                id="tujuanInput"
                rows="3"
                placeholder="Tuliskan alasan kunjungan Anda..."
                required
              ></textarea>
            </div>

            <div class="group full-width">
              <label>Tanda Tangan</label>
              <div class="sig-container">
                <canvas id="signature-pad"></canvas>
                <button type="button" class="clear-btn" id="clearBtn">
                  Hapus
                </button>
              </div>
            </div>

            <div class="full-width">
              <button type="submit" id="submitBtn">Kirim Data Kunjungan</button>
            </div>
          </div>
        </form>
        <div id="status"></div>
      </div>

      <footer class="footer-copyright">
        <div class="footer-divider"></div>
        <p>&copy; 2026 <span class="name">IKING LALUSU</span></p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
