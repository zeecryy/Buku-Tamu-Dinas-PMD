<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Buku Tamu Digital</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --primary-soft: #f0f2ff;
        --accent: #06b6d4;
        --bg-slate: #f8fafc;
        --glass: rgba(255, 255, 255, 0.98);
        --text-dark: #0f172a;
        --text-slate: #64748b;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        margin: 0;
        background: #0f172a
          url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1600")
          no-repeat center center fixed;
        background-size: cover;
        color: var(--text-dark);
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(15, 23, 42, 0.92),
          rgba(30, 41, 59, 0.85)
        );
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px;
        display: none;
      }

      /* Login Screen */
      #auth-overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        padding: 20px;
      }

      .login-card {
        background: white;
        padding: 40px 30px;
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .login-card h2 {
        margin: 0 0 10px 0;
        font-weight: 800;
        color: var(--text-dark);
      }
      .login-card p {
        color: var(--text-slate);
        font-size: 0.9rem;
        margin-bottom: 25px;
      }

      .input-group {
        position: relative;
        margin-bottom: 15px;
      }
      .input-group i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-slate);
      }

      .login-input {
        width: 100%;
        padding: 14px 14px 14px 45px;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .login-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-soft);
      }

      .btn-login {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 10px;
      }
      .btn-login:hover {
        background: var(--primary-hover);
      }

      #error-msg {
        color: #ef4444;
        font-size: 0.85rem;
        font-weight: 600;
        margin-top: 10px;
        display: none;
      }

      /* Dashboard Styles */
      .header {
        background: var(--glass);
        padding: 20px 24px;
        border-radius: 20px;
        margin-bottom: 24px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      .header h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        background: linear-gradient(to right, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .stat-banner {
        background: var(--glass);
        border-radius: 20px;
        padding: 20px 24px;
        margin-bottom: 24px;
        border-left: 6px solid var(--primary);
      }
      .card-wrap {
        background: var(--glass);
        border-radius: 24px;
        overflow-x: auto;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        min-width: 1000px;
      }
      th {
        background: rgba(241, 245, 249, 0.6);
        padding: 16px 20px;
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--text-slate);
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 16px 20px;
        font-size: 0.85rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      .name-tag {
        font-weight: 700;
        color: var(--text-dark);
        text-transform: capitalize;
      }
      .text-cap {
        text-transform: capitalize;
        color: var(--text-slate);
      }
      .wa-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .ttd-img {
        height: 40px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
        padding: 2px;
      }

      @media (max-width: 900px) {
        .card-wrap {
          background: transparent;
          box-shadow: none;
          overflow: visible;
        }
        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
          width: 100%;
          min-width: 0;
        }
        thead {
          display: none;
        }
        tbody tr {
          background: white;
          border-radius: 24px;
          margin-bottom: 20px;
          border: 1px solid var(--border);
          overflow: hidden;
          padding: 0;
        }
        td {
          border: none;
          padding: 10px 20px;
          display: flex;
          flex-direction: column;
        }
        td[data-label="Waktu"] {
          background: var(--primary-soft);
          padding: 15px 20px;
          color: var(--primary);
          font-weight: 800;
          align-items: center;
          border-bottom: 1px solid var(--border);
        }
        td::before {
          content: attr(data-label);
          font-size: 0.65rem;
          font-weight: 800;
          color: var(--text-slate);
          text-transform: uppercase;
          margin-bottom: 4px;
        }
        td[data-label="TTD"] {
          background: var(--bg-slate);
          border-radius: 16px;
          margin: 10px 20px 20px 20px;
          align-items: center;
        }
        .ttd-img {
          height: 70px;
        }
      }
    </style>
  </head>
  <body>
    <div id="auth-overlay">
      <div class="login-card">
        <div
          style="
            background: var(--primary-soft);
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
          "
        >
          <i
            data-lucide="shield-check"
            style="color: var(--primary); width: 32px; height: 32px"
          ></i>
        </div>
        <h2>Admin Login</h2>
        <p>Gunakan password admin untuk mengakses dashboard tamu.</p>

        <div class="input-group">
          <i data-lucide="key-round" size="18"></i>
          <input
            type="password"
            id="passInput"
            class="login-input"
            placeholder="Masukkan password..."
          />
        </div>

        <button onclick="handleLogin()" class="btn-login">
          Buka Dashboard
        </button>
        <p id="error-msg">Password salah, silakan coba lagi.</p>
      </div>
    </div>

    <div class="container" id="main-content">
      <header class="header">
        <h1>Admin DPMD</h1>
      </header>

      <div class="stat-banner">
        <div style="display: flex; flex-direction: column">
          <span
            style="
              font-size: 0.75rem;
              color: var(--text-slate);
              text-transform: uppercase;
              letter-spacing: 1px;
            "
            >Total Pengunjung</span
          >
          <span
            id="t-total"
            style="
              font-size: 1.75rem;
              font-weight: 800;
              color: var(--text-dark);
            "
            >0</span
          >
        </div>
      </div>

      <div class="card-wrap">
        <table>
          <thead>
            <tr>
              <th>Waktu</th>
              <th>Nama</th>
              <th>Jabatan</th>
              <th>Alamat</th>
              <th>Tujuan</th>
              <th>Kontak</th>
              <th>TTD</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td
                colspan="7"
                style="
                  text-align: center;
                  padding: 60px;
                  color: var(--text-slate);
                "
              >
                Menghubungkan database...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const ADMIN_PASSWORD = "admin123";
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbzgNa9NoMsQU8vZMLt5N7drq05d5tyRt2E_SHLIxg9uKI7qmfvJQtsAmkxQO0czIw0ugA/exec";

      function handleLogin() {
        const input = document.getElementById("passInput").value;
        const error = document.getElementById("error-msg");

        if (input === ADMIN_PASSWORD) {
          document.getElementById("auth-overlay").style.display = "none";
          document.getElementById("main-content").style.display = "block";
          loadData();
          setInterval(loadData, 15000);
        } else {
          error.style.display = "block";
          document.getElementById("passInput").value = "";
          document.getElementById("passInput").focus();
        }
      }

      document.getElementById("passInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
      });

      async function loadData() {
        const tableBody = document.getElementById("tableBody");
        try {
          const response = await fetch(scriptURL);
          const data = await response.json();
          const sortedData = [...data].reverse();
          tableBody.innerHTML = "";

          sortedData.forEach((row) => {
            const tr = document.createElement("tr");
            const timeStr = row.Timestamp
              ? new Date(row.Timestamp).toLocaleString("id-ID", {
                  weekday: "long",
                  day: "numeric",
                  month: "short",
                  hour: "2-digit",
                  minute: "2-digit",
                })
              : "-";

            let phone = row.NoHP
              ? row.NoHP.toString().replace(/[^0-9]/g, "")
              : "";
            if (phone.startsWith("0")) {
              phone = "62" + phone.substring(1);
            }

            tr.innerHTML = `
              <td data-label="Waktu">
                <div style="display:flex; align-items:center; gap:8px;">
                  <i data-lucide="calendar" size="18"></i>
                  <span>${timeStr}</span>
                </div>
              </td>
              <td data-label="Nama"><span class="name-tag">${(row.Nama || "-").toLowerCase()}</span></td>
              <td data-label="Jabatan"><span class="text-cap">${(row.Jabatan || "-").toLowerCase()}</span></td>
              <td data-label="Alamat"><span class="text-cap">${(row.Alamat || "-").toLowerCase()}</span></td>
              <td data-label="Tujuan"><div style="color:var(--text-dark)">${row.Tujuan || "-"}</div></td>
              <td data-label="No HP">
                <a target="_blank" href="whatsapp://send?phone=${phone}" class="wa-link">
                  <i data-lucide="phone" size="14"></i> ${row.NoHP || "-"}
                </a>
              </td>
              <td data-label="TTD">
                ${row.TTD ? `<img src="${row.TTD}" class="ttd-img" alt="TTD">` : '<span style="color:#cbd5e1">Tidak ada</span>'}
              </td>
            `;
            tableBody.appendChild(tr);
          });

          document.getElementById("t-total").innerText = data.length;
          lucide.createIcons();
        } catch (e) {
          console.error(e);
        }
      }

      lucide.createIcons();
    </script>
  </body>
</html>
