<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Buku Tamu Digital</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style_admin.css" />
  </head>
  <body>
    <div id="auth-overlay">
      <div class="login-card">
        <div
          style="
            background: var(--primary-soft);
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
          "
        >
          <i
            data-lucide="shield-check"
            style="color: var(--primary); width: 32px; height: 32px"
          ></i>
        </div>
        <h2>Admin Login</h2>
        <p>Gunakan password admin untuk mengakses dashboard tamu.</p>

        <div class="input-group">
          <i data-lucide="key-round" size="18"></i>
          <input
            type="password"
            id="passInput"
            class="login-input"
            placeholder="Masukkan password..."
          />
        </div>

        <button onclick="handleLogin()" class="btn-login">
          Buka Dashboard
        </button>
        <p id="error-msg">Password salah, silakan coba lagi.</p>
      </div>
    </div>

    <div class="container" id="main-content">
      <header class="header">
        <h1>Dashboard Dinas PMD</h1>
      </header>

      <div class="stat-banner">
        <div style="display: flex; flex-direction: column">
          <span
            style="
              font-size: 0.75rem;
              color: var(--text-slate);
              text-transform: uppercase;
              letter-spacing: 1px;
            "
            >Total Pengunjung</span
          >
          <span
            id="t-total"
            style="
              font-size: 1.75rem;
              font-weight: 800;
              color: var(--text-dark);
            "
            >0</span
          >
        </div>
      </div>

      <div class="card-wrap">
        <table>
          <thead>
            <tr>
              <th>Waktu</th>
              <th>Nama</th>
              <th>Jabatan</th>
              <th>Alamat</th>
              <th>Tujuan</th>
              <th>Kontak</th>
              <th>TTD</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td
                colspan="7"
                style="
                  text-align: center;
                  padding: 60px;
                  color: var(--text-slate);
                "
              >
                Menghubungkan database...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="script_admin.js"></script>
  </body>
</html>
